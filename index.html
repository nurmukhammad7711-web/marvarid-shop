<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Marvarid | Ayollar kiyimi</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--tg-theme-secondary-bg-color, #f4f4f5); 
            color: var(--tg-theme-text-color, #000000);
            margin: 0; 
            padding: 15px; 
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h2 { margin: 0 0 5px 0; font-size: 22px; }
        .header p { margin: 0; font-size: 14px; color: #666; }
        .grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
        }
        .card { 
            background: var(--tg-theme-bg-color, #ffffff); 
            border-radius: 12px; 
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }
        .card img { 
            width: 100%; 
            height: 180px; 
            object-fit: cover; 
            background: #eee;
        }
        .card-content { padding: 10px; display: flex; flex-direction: column; flex-grow: 1; }
        .title { font-weight: 600; font-size: 14px; margin: 0 0 5px 0; line-height: 1.2; }
        .desc { font-size: 11px; color: #888; margin: 0 0 8px 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .price { font-weight: bold; color: var(--tg-theme-button-color, #3390ec); margin-bottom: 10px; font-size: 15px; }
        button { 
            background: var(--tg-theme-button-color, #3390ec); 
            color: var(--tg-theme-button-text-color, #ffffff); 
            border: none; 
            padding: 8px; 
            width: 100%; 
            border-radius: 8px; 
            font-weight: 600;
            margin-top: auto;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>💎 Marvarid</h2>
        <p>Olmalik, "Fayz Baraka" 78-do'kon</p>
        <p style="font-size: 12px; color: #22c55e;">Uzum Nasiya mavjud</p>
    </div>
    
    <div class="grid">
        <!-- PRODUCTS_PLACEHOLDER -->
    </div>

    <script>
        window.Telegram.WebApp.expand();
        window.Telegram.WebApp.ready();
    </script>
</body>
</html>
