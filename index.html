<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marvarid Katalog</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: white; padding: 10px; border-radius: 12px; text-align: center; }
        img { width: 100%; border-radius: 8px; }
        .price { font-weight: bold; color: #3390ec; margin: 5px 0; }
        button { background: #3390ec; color: white; border: none; padding: 10px; width: 100%; border-radius: 8px; }
    </style>
</head>
<body>
    <h2 style="text-align:center;">Marvarid Katalog</h2>
    
    <div class="grid">
        <div class="card">
            <img src="https://via.placeholder.com/150" alt="Товар">
            <p>Платок шелковый</p>
            <div class="price">150 000 сум</div>
            <button onclick="alert('Переход в Direct')">Заказать</button>
        </div>
        <div class="card">
            <img src="https://via.placeholder.com/150" alt="Товар">
            <p>Вечернее платье</p>
            <div class="price">450 000 сум</div>
            <button onclick="alert('Переход в Direct')">Заказать</button>
        </div>
    </div>
    <script>Telegram.WebApp.ready();</script>
</body>
</html>
